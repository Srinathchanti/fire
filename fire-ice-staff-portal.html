<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fire & Ice — Luxury Staff Portal</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet"/>
<style>
:root { --primary: #ff6b2b; --ice: #00d4ff; --bg: #ffffff; --text: #0f172a; --border: #e2e8f0; }
body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--text); }

.lounge-card {
  background: white;
  border: 1px solid transparent;
  background-image: linear-gradient(white, white), linear-gradient(135deg, var(--primary), var(--ice));
  background-origin: border-box;
  background-clip: padding-box, border-box;
  box-shadow: 0 10px 40px rgba(0,0,0,0.04);
  border-radius: 24px;
}

.shimmer-btn {
  background: linear-gradient(90deg, var(--primary), #ff8c42, var(--ice), var(--primary));
  background-size: 300% auto;
  color: white;
  font-weight: 800;
  padding: 12px 28px;
  border-radius: 14px;
  animation: shimmer 5s infinite linear;
}
@keyframes shimmer { 0% { background-position: 0% center; } 100% { background-position: 300% center; } }

.input-field { background: #f1f5f9; border-radius: 12px; padding: 12px; width: 100%; outline: none; border: 1px solid transparent; transition: 0.2s; }
.input-field:focus { border-color: var(--primary); background: white; }

.pie-slice { transition: transform 0.3s ease; transform-origin: center; cursor: pointer; }
.pie-slice:hover { transform: scale(1.04); }

.progress-bar-fill { transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// ==========================================
// 1. INITIALIZE SUPABASE
// ==========================================
// TODO: Replace these with your real Supabase project credentials.
// Find them at: Supabase Dashboard → Project Settings → API
// (import.meta.env only works inside a Vite build — this file is loaded
// as a plain script, so it needs plain string values instead.)
const SUPABASE_URL = "YOUR_SUPABASE_URL";
const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";

// If you haven't filled in real credentials yet, the app runs in DEMO MODE:
// accounts/logins are stored locally in this browser only (no real backend).
// Fill in the values above and reload to go live with Supabase.
const DEMO_MODE = SUPABASE_URL.startsWith("YOUR_") || SUPABASE_ANON_KEY.startsWith("YOUR_");
const supabase = DEMO_MODE ? null : window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

if (DEMO_MODE) {
  console.warn("⚡ Fire & Ice is running in DEMO MODE — no Supabase credentials set. Add your SUPABASE_URL / SUPABASE_ANON_KEY at the top of app.js to connect a real backend.");
}

// Local-only auth store used while in DEMO_MODE
const demoAuth = {
  getUsers: () => JSON.parse(localStorage.getItem('demoUsers') || '[]'),
  saveUsers: (u) => localStorage.setItem('demoUsers', JSON.stringify(u)),
  getSession: () => JSON.parse(localStorage.getItem('demoSession') || 'null'),
  setSession: (u) => localStorage.setItem('demoSession', JSON.stringify(u)),
  clearSession: () => localStorage.removeItem('demoSession'),
};

// ==========================================
// HELPER FUNCTIONS
// ==========================================
const money = (n) => '$' + (+(n || 0)).toFixed(2);
const calcHours = (s, e) => {
  if (!s || !e) return 0;
  const [sh, sm] = s.split(':').map(Number);
  const [eh, em] = e.split(':').map(Number);
  let mins = (eh * 60 + em) - (sh * 60 + sm);
  if (mins <= 0) mins += 1440;
  return Math.round(mins * 10 / 60) / 10;
};

// Temporarily keeping local storage for shifts/goals until backend tables are built
const store = {
  get: (k) => JSON.parse(localStorage.getItem(k) || '[]'),
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
  getObj: (k, d) => JSON.parse(localStorage.getItem(k) || JSON.stringify(d)),
  setObj: (k, v) => localStorage.setItem(k, JSON.stringify(v))
};

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const paycheckOf = (dateStr) => {
  const day = parseInt(dateStr.split('-')[2], 10);
  return day <= 15 ? 1 : 2;
};
const monthKey = (dateStr) => dateStr.slice(0, 7);
const formatMonthKey = (key) => {
  const [y, m] = key.split('-');
  return `${MONTH_NAMES[parseInt(m,10) - 1]} ${y}`;
};

function downloadShiftsCSV(data, role) {
  if (!data || !data.length) return alert("No shifts to export.");
  const headers = role === 'admin' 
    ? ["Date", "Staff Name", "Start Time", "End Time", "Vibe", "Hours", "Earned ($)", "Paycheck"]
    : ["Date", "Start Time", "End Time", "Vibe", "Hours", "Earned ($)", "Paycheck"];
  const rows = [];
  let tH = 0; let tP = 0;
  data.forEach(s => {
    tH += (s.hours || 0); tP += (s.earned || 0);
    const pc = `PC${paycheckOf(s.date)}`;
    const row = role === 'admin'
      ? [s.date, s.userName, s.startTime, s.endTime, s.vibe, s.hours, s.earned.toFixed(2), pc]
      : [s.date, s.startTime, s.endTime, s.vibe, s.hours, s.earned.toFixed(2), pc];
    rows.push(row.map(v => `"${v}"`).join(","));
  });
  const totalRow = role === 'admin' 
    ? ["TOTAL", "", "", "", "", tH.toFixed(2), tP.toFixed(2), ""]
    : ["TOTAL", "", "", "", tH.toFixed(2), tP.toFixed(2), ""];
  rows.push(totalRow.join(","));
  const blob = new Blob([headers.join(",") + "\n" + rows.join("\n")], { type: "text/csv;charset=utf-8;" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `Fire_Ice_Report.csv`;
  link.click();
}

// ==========================================
// UI COMPONENTS
// ==========================================
function PieChart({ pc1, pc2 }) {
  const total = pc1 + pc2;
  if (total === 0) {
    return (
      <div className="flex flex-col items-center justify-center h-64 text-slate-400">
        <div className="w-40 h-40 rounded-full border-8 border-dashed border-slate-200 flex items-center justify-center">
          <span className="text-xs font-bold">NO DATA</span>
        </div>
        <p className="mt-4 text-sm font-bold">Log a shift to see your pie</p>
      </div>
    );
  }
  const pc1Pct = (pc1 / total) * 100;
  const pc2Pct = 100 - pc1Pct;
  const cx = 100, cy = 100, r = 80;
  const angle1 = (pc1 / total) * 360;
  const rad = (deg) => (deg - 90) * Math.PI / 180;
  const x1 = cx + r * Math.cos(rad(0));
  const y1 = cy + r * Math.sin(rad(0));
  const x2 = cx + r * Math.cos(rad(angle1));
  const y2 = cy + r * Math.sin(rad(angle1));
  const largeArc = angle1 > 180 ? 1 : 0;
  let pc1Path, pc2Path;
  if (pc1 === total) {
    pc1Path = `M ${cx} ${cy - r} A ${r} ${r} 0 1 1 ${cx - 0.01} ${cy - r} Z`;
    pc2Path = null;
  } else if (pc2 === total) {
    pc2Path = `M ${cx} ${cy - r} A ${r} ${r} 0 1 1 ${cx - 0.01} ${cy - r} Z`;
    pc1Path = null;
  } else {
    pc1Path = `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`;
    pc2Path = `M ${cx} ${cy} L ${x2} ${y2} A ${r} ${r} 0 ${1 - largeArc} 1 ${x1} ${y1} Z`;
  }
  return (
    <div className="flex flex-col md:flex-row items-center gap-8">
      <svg viewBox="0 0 200 200" className="w-56 h-56 drop-shadow-lg">
        <defs>
          <linearGradient id="fireGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor="#ff6b2b" /><stop offset="100%" stopColor="#ff8c42" />
          </linearGradient>
          <linearGradient id="iceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor="#00d4ff" /><stop offset="100%" stopColor="#0ea5e9" />
          </linearGradient>
        </defs>
        {pc1Path && <path d={pc1Path} fill="url(#fireGrad)" stroke="white" strokeWidth="2" className="pie-slice" />}
        {pc2Path && <path d={pc2Path} fill="url(#iceGrad)" stroke="white" strokeWidth="2" className="pie-slice" />}
        <circle cx={cx} cy={cy} r="38" fill="white" />
        <text x={cx} y={cy - 4} textAnchor="middle" className="text-[11px] font-black fill-slate-400">TOTAL</text>
        <text x={cx} y={cy + 14} textAnchor="middle" className="text-base font-black fill-slate-900">{money(total)}</text>
      </svg>
      <div className="space-y-4 flex-1 w-full">
        <div className="p-4 rounded-2xl bg-orange-50 border border-orange-100">
          <div className="flex items-center justify-between mb-1">
            <div className="flex items-center gap-2">
              <div className="w-4 h-4 rounded" style={{background: 'linear-gradient(135deg, #ff6b2b, #ff8c42)'}}></div>
              <p className="font-black text-sm">🔥 Paycheck 1</p>
            </div>
            <p className="text-xs font-bold text-slate-500">1st – 15th</p>
          </div>
          <div className="flex justify-between items-end">
            <p className="text-2xl font-black text-orange-600">{money(pc1)}</p>
            <p className="text-sm font-bold text-orange-500">{pc1Pct.toFixed(1)}%</p>
          </div>
        </div>
        <div className="p-4 rounded-2xl bg-cyan-50 border border-cyan-100">
          <div className="flex items-center justify-between mb-1">
            <div className="flex items-center gap-2">
              <div className="w-4 h-4 rounded" style={{background: 'linear-gradient(135deg, #00d4ff, #0ea5e9)'}}></div>
              <p className="font-black text-sm">❄️ Paycheck 2</p>
            </div>
            <p className="text-xs font-bold text-slate-500">16th – End</p>
          </div>
          <div className="flex justify-between items-end">
            <p className="text-2xl font-black text-cyan-600">{money(pc2)}</p>
            <p className="text-sm font-bold text-cyan-500">{pc2Pct.toFixed(1)}%</p>
          </div>
        </div>
      </div>
    </div>
  );
}

function GoalBar({ label, sublabel, current, goal, gradient, accentColor }) {
  const pct = goal > 0 ? Math.min((current / goal) * 100, 100) : 0;
  const remaining = Math.max(goal - current, 0);
  const hit = current >= goal && goal > 0;
  return (
    <div className="space-y-2">
      <div className="flex justify-between items-end flex-wrap gap-2">
        <div>
          <p className="font-black text-sm">{label}</p>
          {sublabel && <p className="text-xs text-slate-400 font-bold">{sublabel}</p>}
        </div>
        <div className="text-right">
          <p className="font-black text-sm" style={{color: accentColor}}>
            {money(current)} <span className="text-slate-400 font-bold text-xs">/ {money(goal)}</span>
          </p>
          <p className="text-[10px] font-bold text-slate-400">
            {hit ? '🎯 GOAL HIT!' : `${money(remaining)} to go`}
          </p>
        </div>
      </div>
      <div className="h-3 bg-slate-100 rounded-full overflow-hidden relative">
        <div
          className="h-full rounded-full progress-bar-fill"
          style={{ width: `${pct}%`, background: gradient }}
        ></div>
      </div>
      <p className="text-[10px] font-black text-slate-400 text-right">{pct.toFixed(1)}%</p>
    </div>
  );
}

// ==========================================
// MAIN APP COMPONENT
// ==========================================
function App() {
  const [user, setUser] = useState(null);
  const [view, setView] = useState('login'); 
  const [shifts, setShifts] = useState(store.get('shifts'));

  const [personalGoals, setPersonalGoals] = useState(store.getObj('personalGoals', {})); 
  const [teamGoal, setTeamGoal] = useState(store.getObj('teamGoal', { paycheck: 0, monthly: 0 }));

  const [regName, setRegName] = useState('');
  const [regEmail, setRegEmail] = useState('');
  const [regPass, setRegPass] = useState('');
  const [regRate, setRegRate] = useState(15);
  
  const [startTime, setStartTime] = useState('18:00');
  const [endTime, setEndTime] = useState('23:00');
  const [shiftDate, setShiftDate] = useState(new Date().toISOString().split('T')[0]);
  const [shiftVibe, setShiftVibe] = useState('❄️ Chill');
  const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().slice(0, 7));
  const [editingGoals, setEditingGoals] = useState(false);

  // SUPABASE: Listen for Auth State Changes (or restore local demo session)
  useEffect(() => {
    if (DEMO_MODE) {
      const session = demoAuth.getSession();
      if (session) setUser(session);
      return;
    }
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) fetchProfile(session.user);
    });

    supabase.auth.onAuthStateChange((_event, session) => {
      if (session) {
        fetchProfile(session.user);
      } else {
        setUser(null);
      }
    });
  }, []);

  // SUPABASE: Fetch Profile Data from DB
  const fetchProfile = async (authUser) => {
    const { data, error } = await supabase
      .from('profiles')
      .select('full_name, email')
      .eq('id', authUser.id)
      .single();

    if (data) {
      // Determine role based on email
      const isLoungeOwner = data.email.includes('admin'); 
      setUser({
        id: authUser.id,
        name: data.full_name,
        email: data.email,
        role: isLoungeOwner ? 'admin' : 'staff',
        rate: 15 // Placeholder until you add rate to DB!
      });
    }
  };

  // SUPABASE: Real Registration Function (or local demo registration)
  const handleRegister = async (e) => {
    e.preventDefault();

    if (DEMO_MODE) {
      const email = regEmail.toLowerCase();
      const users = demoAuth.getUsers();
      if (users.some(u => u.email === email)) {
        alert("Registration Error: an account with that email already exists.");
        return;
      }
      users.push({
        id: 'demo-' + Date.now(),
        name: regName,
        email,
        password: regPass,
        role: email.includes('admin') ? 'admin' : 'staff',
        rate: Number(regRate) || 15
      });
      demoAuth.saveUsers(users);
      alert("Success! Account created. (Demo mode — saved in this browser only)");
      setView('login');
      return;
    }

    const { data, error } = await supabase.auth.signUp({
      email: regEmail.toLowerCase(),
      password: regPass,
      options: {
        data: {
          full_name: regName 
        }
      }
    });

    if (error) {
      alert("Registration Error: " + error.message);
    } else {
      alert("Success! Account created.");
      setView('login');
    }
  };

  // SUPABASE: Real Login Function (or local demo login)
  const handleLogin = async (e) => {
    e.preventDefault();
    const em = document.getElementById('logEmail').value.toLowerCase();
    const ps = document.getElementById('logPass').value;

    if (DEMO_MODE) {
      const found = demoAuth.getUsers().find(u => u.email === em && u.password === ps);
      if (!found) {
        alert("Access Denied: invalid email or password.");
        return;
      }
      const sessionUser = { id: found.id, name: found.name, email: found.email, role: found.role, rate: found.rate };
      demoAuth.setSession(sessionUser);
      setUser(sessionUser);
      return;
    }

    const { data, error } = await supabase.auth.signInWithPassword({
      email: em,
      password: ps
    });

    if (error) {
      alert("Access Denied: " + error.message);
    }
  };

  // SUPABASE: Logout Function (or local demo logout)
  const handleLogout = async () => {
    if (DEMO_MODE) {
      demoAuth.clearSession();
      setUser(null);
      return;
    }
    await supabase.auth.signOut();
  };

  const addShift = () => {
    const hrs = calcHours(startTime, endTime);
    const newShift = { id: Date.now(), userId: user.id, userName: user.name, date: shiftDate, startTime, endTime, hours: hrs, earned: hrs * user.rate, vibe: shiftVibe };
    const updated = [...shifts, newShift];
    setShifts(updated); store.set('shifts', updated);
    alert("Session Recorded!");
  };

  const deleteShift = (id) => {
    if(window.confirm("Delete record?")) {
      const u = shifts.filter(s => s.id !== id);
      setShifts(u); store.set('shifts', u);
    }
  };

  const saveGoals = (paycheck, monthly) => {
    if (user.role === 'admin') {
      const ng = { paycheck: Number(paycheck) || 0, monthly: Number(monthly) || 0 };
      setTeamGoal(ng); store.setObj('teamGoal', ng);
    } else {
      const ng = { ...personalGoals, [user.id]: { paycheck: Number(paycheck) || 0, monthly: Number(monthly) || 0 } };
      setPersonalGoals(ng); store.setObj('personalGoals', ng);
    }
    setEditingGoals(false);
  };

  const visibleShifts = user?.role === 'admin' ? shifts : shifts.filter(s => s.userId === user?.id);
  const totalEarned = visibleShifts.reduce((a, b) => a + b.earned, 0);

  const { pc1Total, pc2Total, monthsHistory, availableMonths } = useMemo(() => {
    const byMonth = {};
    visibleShifts.forEach(s => {
      const mk = monthKey(s.date);
      if (!byMonth[mk]) byMonth[mk] = { pc1: 0, pc2: 0 };
      if (paycheckOf(s.date) === 1) byMonth[mk].pc1 += s.earned;
      else byMonth[mk].pc2 += s.earned;
    });
    const sel = byMonth[selectedMonth] || { pc1: 0, pc2: 0 };
    const months = Object.keys(byMonth).sort().reverse();
    const history = months.map(m => ({
      key: m, label: formatMonthKey(m),
      pc1: byMonth[m].pc1, pc2: byMonth[m].pc2,
      total: byMonth[m].pc1 + byMonth[m].pc2
    }));
    const currentKey = new Date().toISOString().slice(0, 7);
    const allMonths = Array.from(new Set([currentKey, ...months])).sort().reverse();
    return { pc1Total: sel.pc1, pc2Total: sel.pc2, monthsHistory: history, availableMonths: allMonths };
  }, [visibleShifts, selectedMonth]);

  const activeGoals = user
    ? (user.role === 'admin' ? teamGoal : (personalGoals[user.id] || { paycheck: 0, monthly: 0 }))
    : { paycheck: 0, monthly: 0 };

  if (!user) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-slate-50 p-6">
        <div className="lounge-card w-full max-w-md p-10 text-center space-y-8">
          <h1 className="text-4xl font-black tracking-tighter">FIRE & <span className="text-cyan-400">ICE</span></h1>
          {DEMO_MODE && (
            <p className="text-[10px] font-black text-orange-500 bg-orange-50 border border-orange-100 rounded-full px-3 py-1 inline-block -mt-4">
              ⚡ DEMO MODE — accounts saved in this browser only
            </p>
          )}
          <div className="flex bg-slate-100 p-1 rounded-xl">
            <button onClick={() => setView('login')} className={`flex-1 py-2 rounded-lg font-bold ${view === 'login' ? 'bg-white shadow-sm' : ''}`}>Login</button>
            <button onClick={() => setView('register')} className={`flex-1 py-2 rounded-lg font-bold ${view === 'register' ? 'bg-white shadow-sm' : ''}`}>Register</button>
          </div>
          {view === 'login' ? (
            <div className="space-y-4">
              <input id="logEmail" type="email" placeholder="Email Address" className="input-field" />
              <input id="logPass" type="password" placeholder="Password" className="input-field" />
              <button onClick={handleLogin} className="shimmer-btn w-full">Enter Lounge</button>
            </div>
          ) : (
            <form onSubmit={handleRegister} className="space-y-4 text-left">
              <input type="text" placeholder="Full Name" className="input-field" required onChange={e => setRegName(e.target.value)} />
              <input type="email" placeholder="Email" className="input-field" required onChange={e => setRegEmail(e.target.value)} />
              <input type="password" placeholder="Password" className="input-field" required onChange={e => setRegPass(e.target.value)} />
              <input type="number" placeholder="Rate ($)" className="input-field" required onChange={e => setRegRate(e.target.value)} />
              <button className="shimmer-btn w-full">Join Team</button>
            </form>
          )}
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen flex flex-col md:flex-row bg-white">
      <aside className="w-full md:w-64 border-r p-8 flex flex-col bg-white">
        <h2 className="text-2xl font-black tracking-tighter mb-10">FIRE & <span className="text-cyan-400">ICE</span></h2>
        <div className="flex-1 space-y-4">
          <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
            {/* Privacy Override: Display generalized workspace name instead of full name */}
            <p className="font-extrabold text-slate-800">My Workspace</p>
          </div>
        </div>
        <button onClick={handleLogout} className="text-left text-sm font-bold text-slate-400 hover:text-red-500 transition-colors">SIGN OUT ⏻</button>
      </aside>

      <main className="flex-1 p-8 md:p-16 max-w-6xl">
        <header className="flex justify-between items-center mb-10">
          <h1 className="text-4xl font-black uppercase tracking-tighter">{user.role === 'admin' ? 'Business Pulse' : 'My Dashboard'}</h1>
          <button onClick={() => downloadShiftsCSV(visibleShifts, user.role)} className="px-5 py-2 border rounded-xl font-bold text-sm hover:border-orange-500 transition-all">📥 Export CSV</button>
        </header>

        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
          <div className="lounge-card p-8 border-l-8 border-l-orange-500">
            <p className="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Total {user.role === 'admin' ? 'Payouts' : 'Earned'}</p>
            <p className="text-5xl font-black">{money(totalEarned)}</p>
          </div>
          <div className="lounge-card p-8 border-l-8 border-l-cyan-500">
            <p className="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Shift Records</p>
            <p className="text-5xl font-black">{visibleShifts.length}</p>
          </div>
        </div>

        {/* ---- 🎯 GOAL TRACKER ---- */}
        <div className="lounge-card p-8 md:p-10 mb-10">
          <div className="flex flex-wrap justify-between items-center gap-4 mb-6">
            <div>
              <h3 className="text-xl font-black uppercase tracking-tight">🎯 {user.role === 'admin' ? 'Team Goals' : 'My Goals'}</h3>
              <p className="text-sm text-slate-500 mt-1">
                {user.role === 'admin' 
                  ? 'Targets for the entire team — adjust to push the lounge forward'
                  : 'Set your personal targets and watch them fill up'}
                {' · '}{formatMonthKey(selectedMonth)}
              </p>
            </div>
            <button
              onClick={() => setEditingGoals(!editingGoals)}
              className="px-4 py-2 border rounded-xl font-bold text-xs hover:border-orange-500 transition-all"
            >
              {editingGoals ? '✕ Cancel' : '✎ Edit Goals'}
            </button>
          </div>

          {editingGoals ? (
            <GoalEditor 
              initial={activeGoals}
              onSave={saveGoals}
              onCancel={() => setEditingGoals(false)}
            />
          ) : (
            <>
              {(activeGoals.paycheck === 0 && activeGoals.monthly === 0) ? (
                <div className="text-center py-8 text-slate-400">
                  <p className="text-4xl mb-3">🎯</p>
                  <p className="font-bold">No goals set yet</p>
                  <p className="text-xs mt-1">Click "Edit Goals" above to set your targets</p>
                </div>
              ) : (
                <div className="space-y-6">
                  {activeGoals.paycheck > 0 && (
                    <>
                      <GoalBar
                        label="🔥 Paycheck 1 Goal"
                        sublabel="1st – 15th of the month"
                        current={pc1Total}
                        goal={activeGoals.paycheck}
                        gradient="linear-gradient(90deg, #ff6b2b, #ff8c42)"
                        accentColor="#ea580c"
                      />
                      <GoalBar
                        label="❄️ Paycheck 2 Goal"
                        sublabel="16th – End of month"
                        current={pc2Total}
                        goal={activeGoals.paycheck}
                        gradient="linear-gradient(90deg, #00d4ff, #0ea5e9)"
                        accentColor="#0891b2"
                      />
                    </>
                  )}
                  {activeGoals.monthly > 0 && (
                    <div className={activeGoals.paycheck > 0 ? "pt-6 border-t" : ""}>
                      <GoalBar
                        label="📅 Monthly Total Goal"
                        sublabel="Both paychecks combined"
                        current={pc1Total + pc2Total}
                        goal={activeGoals.monthly}
                        gradient="linear-gradient(90deg, #ff6b2b, #00d4ff)"
                        accentColor="#0f172a"
                      />
                    </div>
                  )}
                </div>
              )}
            </>
          )}
        </div>

        {/* ---- PAYCHECK BREAKDOWN ---- */}
        <div className="lounge-card p-8 md:p-10 mb-10">
          <div className="flex flex-wrap justify-between items-center gap-4 mb-8">
            <div>
              <h3 className="text-xl font-black uppercase tracking-tight">💸 Paycheck Breakdown</h3>
              <p className="text-sm text-slate-500 mt-1">Semi-monthly: 1st–15th & 16th–end</p>
            </div>
            <select
              value={selectedMonth}
              onChange={e => setSelectedMonth(e.target.value)}
              className="input-field max-w-xs font-bold"
              style={{width: 'auto'}}
            >
              {availableMonths.map(m => (
                <option key={m} value={m}>{formatMonthKey(m)}</option>
              ))}
            </select>
          </div>

          <PieChart pc1={pc1Total} pc2={pc2Total} />

          {monthsHistory.length > 0 && (
            <div className="mt-10 pt-8 border-t">
              <p className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">📅 Past Paychecks</p>
              <div className="space-y-2 max-h-64 overflow-y-auto">
                {monthsHistory.map(m => (
                  <div
                    key={m.key}
                    onClick={() => setSelectedMonth(m.key)}
                    className={`flex items-center justify-between p-4 rounded-xl border cursor-pointer transition-all ${selectedMonth === m.key ? 'border-orange-400 bg-orange-50' : 'border-slate-100 hover:border-slate-300 bg-white'}`}
                  >
                    <div className="flex-1">
                      <p className="font-black text-sm">{m.label}</p>
                      <div className="flex gap-4 text-xs text-slate-500 mt-1 font-bold">
                        <span>🔥 PC1 {money(m.pc1)}</span>
                        <span>❄️ PC2 {money(m.pc2)}</span>
                      </div>
                    </div>
                    <p className="font-black text-lg">{money(m.total)}</p>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        {user.role !== 'admin' && (
          <div className="lounge-card p-10 mb-10 space-y-6">
            <h3 className="text-xl font-bold">New Session Log</h3>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              <input type="date" className="input-field" value={shiftDate} onChange={e => setShiftDate(e.target.value)} />
              <input type="time" className="input-field" value={startTime} onChange={e => setStartTime(e.target.value)} />
              <input type="time" className="input-field" value={endTime} onChange={e => setEndTime(e.target.value)} />
            </div>
            <div className="flex flex-wrap gap-4 items-center justify-between border-t pt-6">
              <div className="flex gap-2">
                {['❄️ Chill', '🔥 Busy', '🎉 Party'].map(v => (
                  <button key={v} onClick={() => setShiftVibe(v)} className={`px-4 py-2 rounded-xl text-xs font-bold border transition-all ${shiftVibe === v ? 'bg-slate-900 text-white border-slate-900' : 'bg-white border-slate-200'}`}>{v}</button>
                ))}
              </div>
              <button onClick={addShift} className="shimmer-btn">Submit Shift</button>
            </div>
          </div>
        )}

        <div className="lounge-card overflow-hidden">
          <table className="w-full text-left">
            <thead className="bg-slate-50 border-b">
              <tr>
                <th className="p-6 text-xs font-black text-slate-400">DATE</th>
                {user.role === 'admin' && <th className="p-6 text-xs font-black text-slate-400">STAFF</th>}
                <th className="p-6 text-xs font-black text-slate-400">VIBE</th>
                <th className="p-6 text-xs font-black text-slate-400">TIME</th>
                <th className="p-6 text-xs font-black text-slate-400">PC</th>
                <th className="p-6 text-xs font-black text-slate-400 text-right">PAYOUT</th>
                <th className="p-6"></th>
              </tr>
            </thead>
            <tbody>
              {visibleShifts.slice().reverse().map(s => {
                const pc = paycheckOf(s.date);
                return (
                  <tr key={s.id} className="border-b hover:bg-slate-50 transition-colors">
                    <td className="p-6 font-bold">{s.date}</td>
                    {user.role === 'admin' && <td className="p-6 font-medium text-slate-600">{s.userName}</td>}
                    <td className="p-6"><span className="px-3 py-1 bg-white border rounded-full text-[10px] font-black">{s.vibe}</span></td>
                    <td className="p-6 text-slate-500 font-mono text-sm">{s.startTime}-{s.endTime} ({s.hours}h)</td>
                    <td className="p-6">
                      <span className={`px-3 py-1 rounded-full text-[10px] font-black ${pc === 1 ? 'bg-orange-100 text-orange-700' : 'bg-cyan-100 text-cyan-700'}`}>
                        {pc === 1 ? '🔥 PC1' : '❄️ PC2'}
                      </span>
                    </td>
                    <td className="p-6 font-black text-right">{money(s.earned)}</td>
                    <td className="p-6 text-right">
                      <button onClick={() => deleteShift(s.id)} className="text-slate-300 hover:text-red-500 font-bold transition-colors">×</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </main>
    </div>
  );
}

function GoalEditor({ initial, onSave, onCancel }) {
  const [pc, setPc] = useState(initial.paycheck || '');
  const [mo, setMo] = useState(initial.monthly || '');
  return (
    <div className="space-y-6 bg-slate-50 p-6 rounded-2xl border border-slate-100">
      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label className="text-xs font-black text-slate-500 uppercase tracking-widest block mb-2">💰 Per-Paycheck Goal</label>
          <div className="relative">
            <span className="absolute left-4 top-1/2 -translate-y-1/2 font-black text-slate-400">$</span>
            <input
              type="number"
              value={pc}
              onChange={e => setPc(e.target.value)}
              placeholder="2000"
              className="input-field pl-8 font-bold text-lg"
            />
          </div>
          <p className="text-[10px] text-slate-400 font-bold mt-2">Applies to BOTH PC1 and PC2 separately</p>
        </div>
        <div>
          <label className="text-xs font-black text-slate-500 uppercase tracking-widest block mb-2">📅 Monthly Total Goal</label>
          <div className="relative">
            <span className="absolute left-4 top-1/2 -translate-y-1/2 font-black text-slate-400">$</span>
            <input
              type="number"
              value={mo}
              onChange={e => setMo(e.target.value)}
              placeholder="4000"
              className="input-field pl-8 font-bold text-lg"
            />
          </div>
          <p className="text-[10px] text-slate-400 font-bold mt-2">Combined total for the whole month</p>
        </div>
      </div>
      <div className="flex justify-end gap-3 border-t pt-4">
        <button onClick={onCancel} className="px-5 py-2 border rounded-xl font-bold text-sm">Cancel</button>
        <button onClick={() => onSave(pc, mo)} className="shimmer-btn">Save Goals</button>
      </div>
      <p className="text-[10px] text-slate-400 text-center">💡 Tip: Set a goal to 0 (or leave blank) to hide its progress bar</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
